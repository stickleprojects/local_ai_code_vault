name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        # -v lists each test name; -ra summarises non-pass outcomes.
        run: pytest -v -ra

  pester:
    name: pester (host scripts)
    runs-on: ubuntu-latest
    # pwsh + git are preinstalled on the runner; the suite fakes docker
    # via a PATH shim and the API via an in-process listener, so this
    # needs no Docker stack / GPU (Phase 3, Option B).
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester 5
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run Pester
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.5.0
          $c = New-PesterConfiguration
          $c.Run.Path = 'tests/scripts.Tests.ps1'
          $c.Run.Exit = $true
          $c.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $c

  # Windows legs. Separate jobs (not a matrix) so the branch-protection
  # required context stays exactly "pytest" — matrixing would rename it
  # to "pytest (ubuntu-latest)" and block every merge. The host scripts
  # and the Copilot MCP adapter target Windows, so OS-native path
  # behaviour must be exercised here, not just on Linux.
  test-windows:
    name: pytest (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v -ra

  pester-windows:
    name: pester (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester 5
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run Pester
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.5.0
          $c = New-PesterConfiguration
          $c.Run.Path = 'tests/scripts.Tests.ps1'
          $c.Run.Exit = $true
          $c.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $c

  eval-replay:
    name: eval-replay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip until recorded vectors are committed
        if: ${{ hashFiles('eval/vectors.json') == '' }}
        run: echo "eval/vectors.json is not committed yet; skipping replay eval."

      - name: Start replay stack
        if: ${{ hashFiles('eval/vectors.json') != '' }}
        run: docker compose -f docker-compose.yml -f docker-compose.replay.yml up -d --wait

      - name: Build indexer image
        if: ${{ hashFiles('eval/vectors.json') != '' }}
        run: docker build -t vault-indexer:local -f indexer/Dockerfile .

      - name: Run replay eval
        if: ${{ hashFiles('eval/vectors.json') != '' }}
        shell: pwsh
        run: pwsh -NoProfile -File eval/run-eval.ps1

      - name: Stop replay stack
        if: ${{ always() && hashFiles('eval/vectors.json') != '' }}
        run: docker compose -f docker-compose.yml -f docker-compose.replay.yml down -v
